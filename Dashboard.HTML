<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            margin: 0;
        }

        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            background: #ffffff;
            border-bottom: 1px solid #ddd;
        }

        .tab {
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            border-bottom: 3px solid #007bff;
            color: #007bff;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            margin: 30px auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        #result, #bookResult {
            margin-top: 20px;
            text-align: left;
        }

        .order-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            background: #ffffff;
        }

        footer {
            margin-top: 40px;
            background: #222;
            color: white;
            padding: 15px;
            font-size: 14px;
        }

        footer p {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<header>
    📦 Order & Book Dashboard
</header>

<div class="tabs">
    <div class="tab active" onclick="switchTab('order')">Track Order</div>
    <div class="tab" onclick="switchTab('book')">Search Books</div>
</div>

<!-- ORDER SECTION -->
<div class="container" id="orderSection">
    <h3>Track Your Order</h3>

    <input type="text" id="inputData" placeholder="Enter Mobile or Email">
    <br>
    <button onclick="searchData()">Search</button>

    <div id="result"></div>
</div>

<!-- BOOK SECTION -->
<div class="container" id="bookSection" style="display:none;">
    <h3>Search Books (Pre-order / New)</h3>

    <input type="text" id="bookInput" placeholder="Enter Book Name">
    <br>
    <button onclick="searchBooks()">Search</button>

    <div id="bookResult"></div>
</div>

<footer>
    <p><b>Instructions:</b></p>
    <p>• Enter mobile/email to track order</p>
    <p>• Use Book Search for new or pre-order books</p>
    <p>• AWB = Tracking Number</p>
    <p>• EDD = Expected Delivery Date</p>
</footer>

<script>
function switchTab(tab) {
    document.getElementById("orderSection").style.display = tab === 'order' ? "block" : "none";
    document.getElementById("bookSection").style.display = tab === 'book' ? "block" : "none";

    let tabs = document.querySelectorAll(".tab");
    tabs.forEach(t => t.classList.remove("active"));

    event.target.classList.add("active");
}

// EXISTING ORDER SEARCH FUNCTION (UNCHANGED)
async function searchData() {
    let input = document.getElementById("inputData").value.trim();
    let resultDiv = document.getElementById("result");

    if (input === "") {
        resultDiv.innerHTML = "Enter mobile or email";
        return;
    }

    resultDiv.innerHTML = "Searching...";

    let response = await fetch("https://sheet-bot-sfuv.onrender.com/search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query: input })
    });

    let data = await response.json();

    if (!data.orders || data.orders.length === 0) {
        resultDiv.innerHTML = "No orders found";
        return;
    }

    let html = `<b>${data.count} Order(s)</b><br><br>`;

    data.orders.forEach(order => {
        html += `
            <div class="order-card">
                <p><b>${order.product}</b></p>
                <p>Status: ${order.status}</p>
                <p>Courier: ${order.courier}</p>
                <p>AWB: ${order.awb || "NA"}</p>
            </div>
        `;
    });

    resultDiv.innerHTML = html;
}

// NEW BOOK SEARCH FUNCTION
async function searchBooks() {
    let input = document.getElementById("bookInput").value.trim();
    let resultDiv = document.getElementById("bookResult");

    if (input === "") {
        resultDiv.innerHTML = "Enter book name";
        return;
    }

    resultDiv.innerHTML = "Searching books...";

    // 👉 Replace this API with your actual source (Sheet / DB / API)
    let response = await fetch("https://sheet-bot-sfuv.onrender.com/book-search", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ query: input })
    });

    let data = await response.json();

    if (!data.books || data.books.length === 0) {
        resultDiv.innerHTML = "No books found";
        return;
    }

    let html = "";

    data.books.forEach(book => {
        html += `
            <div class="order-card">
                <p><b>${book.name}</b></p>
                <p>Status: ${book.type}</p>
                <p>Price: ₹${book.price}</p>
            </div>
        `;
    });

    resultDiv.innerHTML = html;
}
</script>

</body>
</html>
